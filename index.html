<html lang="en">
  <head>
    <link rel="stylesheet" href="index.css" />

    <!-- Viewport Meta Tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
      integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Smythe&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Jimmy’s Diner</h1>
        <p>The best burgers and pizzas in town.</p>
      </header>

      <main>
        <div class="sub-container">
          <ul class="menu-feed" id="menu-feed">
            <!-- Menu list goes -->
          </ul>

          <!-- checkout section -->
          <section class="checkout-section" id="checkout-section">
            <h3 class="your-order">Your order</h3>
            <ul class="orders">
              <li class="order">
                <span class="order-name">Pizza</span>
                <button class="btn btn-remove">remove</button>
                <span class="order-price">$14</span>
              </li>
            </ul>

            <div class="total">
              <span class="total-price-text">Total price</span>
              <span class="total-price">$26</span>
            </div>

            <button class="btn btn-primary">Complete order</button>
          </section>

          <!-- thank you message -->
          <div class="thank-you-message" id="thank-you-message">
            <p>Thanks, James! Your order is on its way!</p>
          </div>
        </div>
      </main>
      <section id="modal-card-details" class="modal-card-details">
        <h2 class="card-details-text">Enter card details</h2>
        <form>
          <input
            type="text"
            id="your-name"
            placeholder="Enter your name"
            aria-label="Enter your name"
            required
          />
          <input
            type="number"
            id="card-number"
            placeholder="Enter card number"
            aria-label="Enter card number"
            required
          />
          <input
            type="number"
            id="cvv"
            class="input-cvv"
            placeholder="Enter CVV"
            aria-label="Enter CVV"
            max="3"
            required
          />
          <button class="btn btn-primary" id="btn-pay">Pay</button>
        </form>
      </section>
    </div>
    <script src="index.js" type="module"></script>
  </body>
</html>
